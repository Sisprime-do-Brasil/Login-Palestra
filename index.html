<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso à Palestra - Sisprime</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            /* COLOQUE O LINK DA SUA IMAGEM ABAIXO */
            background: url('https://lh3.googleusercontent.com/d/1y5RR3Zextv-LW6MHjhHDSyMoZYW1Gyl1') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 52, 113, 0.4); /* Filtro azul suave sobre a imagem */
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border-top: 6px solid #00A98E;
        }

        h2 { color: #0b3471; margin-bottom: 10px; }
        p { color: #444; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: #0b3471; }

        button {
            width: 100%;
            padding: 15px;
            background-color: #0047BB;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #00A98E; }

        #mensagem { margin-top: 20px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <h2>Bem-vindo!</h2>
        <p>Informe seu CPF para acessar a transmissão:</p>
        
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
        <button onclick="enviar()">ENTRAR NA PALESTRA</button>
        
        <div id="mensagem"></div>
    </div>

    <script>
        function enviar() {
            const cpf = document.getElementById('cpf').value;
            const msg = document.getElementById('mensagem');
            const urlApp = "https://script.google.com/macros/s/AKfycbzgV2T6a58h6qd7bbX7RLTm2-T1Lqh88xmop4DuQwdfRCbRgipigqXTO2WlfpDt9nEt/exec";

            if(!cpf) {
                msg.innerHTML = "Por favor, digite o CPF.";
                msg.style.color = "red";
                return;
            }

            msg.style.color = "#0b3471";
            msg.innerHTML = "Validando acesso...";

            // Envia o CPF para o Google registrar o log
            fetch(urlApp + "?cpf=" + encodeURIComponent(cpf), {
                mode: 'no-cors'
            }).then(() => {
                msg.style.color = "#00A98E";
                msg.innerHTML = "Acesso autorizado! Redirecionando...";
                
                setTimeout(() => {
                    window.location.href = "https://sisprimedobrasil.info/PalestraMarcioAtalla";
                }, 1500);
            }).catch(() => {
                // Em caso de erro de rede, tenta redirecionar mesmo assim
                window.location.href = "https://sisprimedobrasil.info/PalestraMarcioAtalla";
            });
        }
    </script>
</body>
</html>
