<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso à Palestra - Sisprime</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            /* Imagem de fundo ajustada com seu link do Drive */
            background: url('https://lh3.googleusercontent.com/d/1y5RR3Zextv-LW6MHjhHDSyMoZYW1Gyl1') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 52, 113, 0.5);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.96);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border-top: 6px solid #00A98E;
        }

        h2 { color: #0b3471; margin-bottom: 10px; }
        p { color: #444; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #0047BB;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #00A98E; }

        #mensagem { margin-top: 20px; font-weight: bold; font-size: 14px; color: #0b3471; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <h2>Bem-vindo!</h2>
        <p>Informe seu CPF para acessar a transmissão:</p>
        
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
        <button onclick="enviar()">ENTRAR NA PALESTRA</button>
        
        <div id="mensagem"></div>
    </div>

    <script>
    function enviar() {
        var cpf = document.getElementById('cpf').value;
        var msg = document.getElementById('mensagem');
        var urlApp = "https://script.google.com/macros/s/AKfycbxQj55JybJghsRc9p5Z5wBPDlcRWJ_FW20WeMjUpSxmwIofovPH8vXQ-CX5G-oVMfkc/exec";

        if(!cpf) {
            msg.innerHTML = "Por favor, digite o CPF.";
            msg.style.color = "red";
            return;
        }

        msg.style.color = "#0b3471";
        msg.innerHTML = "Validando... por favor aguarde.";

        // Método Híbrido: Tenta validar e receber o link, se falhar, força o redirecionamento
        fetch(urlApp + "?cpf=" + encodeURIComponent(cpf))
            .then(response => response.text())
            .then(link => {
                // Se o Google respondeu o link, vamos para ele
                window.location.href = link;
            })
            .catch(err => {
                // Plano B: Se o firewall bloquear a resposta, 
                // o próprio link do Google fará o trabalho pesado
                window.location.href = urlApp + "?cpf=" + encodeURIComponent(cpf);
            });
    }
</script>
</body>
</html>
