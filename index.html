<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso à Palestra - Sisprime</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b3471; /* Azul institucional fundo */
            background-image: linear-gradient(135deg, #0b3471 0%, #0047BB 100%);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border-top: 8px solid #00A98E; /* Detalhe em verde Sisprime */
        }

        h2 { color: #0b3471; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; font-size: 15px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #0047BB;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #00A98E; }

        #mensagem {
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        a { color: #0047BB; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Acesso à Palestra</h2>
        <p>Valide sua inscrição informando seu CPF abaixo:</p>
        
        <input type="text" id="cpf" placeholder="000.000.000-00">
        <button onclick="validar()">ACESSAR PALESTRA</button>
        
        <div id="mensagem"></div>
    </div>

    <script>
        function validar() {
            const cpf = document.getElementById('cpf').value;
            const msg = document.getElementById('mensagem');
            
            if(!cpf) {
                msg.innerHTML = "Por favor, preencha o CPF.";
                msg.style.color = "red";
                return;
            }

            msg.style.color = "#666";
            msg.innerHTML = "Verificando dados...";

            // URL DO SEU GOOGLE SCRIPT (A que termina em /exec)
            const urlApp = "https://script.google.com/macros/s/AKfycbxf4dj7XF0yRPE0DGSiAsnn1SBnaZ4QEgCHFvKeaJRZjUjYTay2gooffbfNOtdlYd-G/exec";

            // Usando o google.script.run se estivesse no Apps Script, 
            // mas como estamos no GitHub, chamamos via API:
            fetch(urlApp + "?cpf=" + cpf)
                .then(res => res.json())
                .then(res => {
                    if (res.sucesso) {
                        msg.style.color = "#00A98E";
                        msg.innerHTML = "Sucesso! Redirecionando...";
                        window.location.href = "https://sisprimedobrasil.info/PalestraMarcioAtalla";
                    } else {
                        msg.style.color = "#d93025";
                        msg.innerHTML = res.mensagem;
                    }
                })
                .catch(err => {
                    msg.innerHTML = "Erro ao conectar com o servidor. Tente novamente.";
                    console.error(err);
                });
        }
    </script>
</body>
</html>
